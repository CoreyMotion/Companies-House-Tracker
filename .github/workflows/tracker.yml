name: Companies House Tracker

on:
  schedule:
    - cron: '0 * * * *'   # Every hour — change to '*/30 * * * *' for 30-min updates
    - cron: '30 * * * *'
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to push commits back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker (single cycle)
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
        run: python companies_house_tracker.py --once

      - name: Generate index.html
        run: |
          COMPANY_COUNT=$(python - <<'EOF'
          import json, pathlib
          ds = pathlib.Path("data_store.json")
          print(len(json.loads(ds.read_text())) if ds.exists() else 0)
          EOF
          )
          LAST_RUN=$(python - <<'EOF'
          import json, pathlib
          st = pathlib.Path("tracker_state.json")
          data = json.loads(st.read_text()) if st.exists() else {}
          print(data.get("last_run", "Never"))
          EOF
          )
          cat > index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta http-equiv="refresh" content="3600">
            <title>Companies House Tracker</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                     max-width: 680px; margin: 60px auto; padding: 0 24px;
                     color: #1a1a2e; background: #f8f9fc; }
              h1 { color: #1F4E79; }
              .stat { font-size: 2.4rem; font-weight: 700; color: #1F4E79; }
              .label { font-size: 0.85rem; color: #666; text-transform: uppercase;
                       letter-spacing: 0.05em; margin-bottom: 24px; }
              .btn { display: inline-block; background: #1F4E79; color: #fff;
                     padding: 14px 28px; border-radius: 6px; text-decoration: none;
                     font-size: 1rem; font-weight: 600; margin-top: 16px; }
              .btn:hover { background: #163a5c; }
              .meta { margin-top: 32px; font-size: 0.85rem; color: #888; }
            </style>
          </head>
          <body>
            <h1>Companies House Tracker</h1>
            <div class="stat">${COMPANY_COUNT}</div>
            <div class="label">companies tracked</div>
            <p>Last updated: <strong>${LAST_RUN}</strong></p>
            <a class="btn" href="companies_tracker.xlsx" download>Download Excel Report</a>
            <div class="meta">Updates automatically every hour via GitHub Actions.</div>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add companies_tracker.xlsx tracker_state.json data_store.json index.html
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update tracker data [skip ci]"
            git push
          fi
